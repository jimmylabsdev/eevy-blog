<header class="site-header">
  <div class="container header-inner">
    <a href="{{ "/" | relURL }}" class="brand">
      <img src="/images/eevy-logo.png" alt="eevy.in" class="brand-logo">
    </a>

    <nav class="site-nav" aria-label="Primary">
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
          {{ $active := or (eq $.RelPermalink .URL) (and (ne .URL "/") (hasPrefix $.RelPermalink .URL)) }}
          <li class="nav-item {{ if $active }}is-active{{ end }}">
            <a href="{{ .URL | relURL }}">{{ .Name }}</a>
          </li>
        {{ end }}
      </ul>

      <a
        href="https://instagram.com/YOUR_HANDLE"
        target="_blank"
        rel="noopener"
        class="nav-instagram-btn"
      >
        Follow Eevy India
      </a>

      <button type="button" class="theme-toggle" aria-label="Toggle dark mode" data-theme-toggle>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>

      <button type="button" class="nav-toggle" aria-label="Toggle menu" data-nav-toggle>
        <span></span><span></span><span></span>
      </button>
    </nav>
  </div>
</header>
